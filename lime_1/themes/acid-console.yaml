# ~/.hermes/dashboard-themes/acid-console.yaml
# ──────────────────────────────────────────────────────────────
#  ACID CONSOLE  ·  warm green-black + punchy acid lime + scanlines
#  The most "terminal" of the three: warm-tinted near-black, a brighter
#  acid lime, and a subtle scanline overlay for retro-CRT eye-candy.
# ──────────────────────────────────────────────────────────────
name: acid-console
label: Acid Console
description: Warm green-black terminal vibe with punchy acid-lime accents and soft scanlines.

palette:
  background:
    hex: "#0a0b07"
    alpha: 1.0
  midground:
    hex: "#e9ecdb"      # warm light → body text
    alpha: 1.0
  foreground:
    hex: "#ffffff"
    alpha: 0.0
  warmGlow: "rgba(204, 255, 51, 0.2)"
  noiseOpacity: 0.85

typography:
  fontSans: '"Geist", system-ui, -apple-system, "Segoe UI", sans-serif'
  fontMono: '"JetBrains Mono", ui-monospace, "SFMono-Regular", monospace'
  fontDisplay: '"Geist", system-ui, sans-serif'
  fontUrl: "https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
  baseSize: "16px"
  lineHeight: "1.55"
  letterSpacing: "0"

layout:
  radius: "0.5rem"
  density: comfortable

layoutVariant: cockpit

componentStyles:
  card:
    background: "linear-gradient(180deg, rgba(20, 22, 14, 0.92), rgba(10, 11, 7, 0.95))"
    boxShadow: "inset 0 0 0 1px rgba(204, 255, 51, 0.16), 0 18px 40px -24px rgba(0, 0, 0, 0.92)"
  header:
    background: "linear-gradient(180deg, rgba(16, 18, 9, 0.96), rgba(10, 11, 7, 0.92))"
  sidebar:
    background: "linear-gradient(180deg, rgba(16, 18, 9, 0.6), rgba(10, 11, 7, 0))"
  footer:
    background: "rgba(16, 18, 9, 0.6)"

colorOverrides:
  primary: "#ccff33"
  primaryForeground: "#0a0b07"
  accent: "#ccff33"
  accentForeground: "#0a0b07"
  ring: "#ccff33"
  border: "rgba(204, 255, 51, 0.24)"
  input: "rgba(204, 255, 51, 0.08)"
  mutedForeground: "#aab198"
  success: "#9fe24a"
  warning: "#e8d24a"
  destructive: "#ff6a4a"

# Vignette glow + grain come from palette.warmGlow / noiseOpacity (Backdrop).
# The scanline overlay is top-layer chrome (z-index 100, screen blend) and is
# NOT gated on a layout variant, so it shows on every page.
customCSS: |
  :focus-visible {
    outline: none !important;
    box-shadow: 0 0 0 3px rgba(204, 255, 51, 0.22) !important;
  }
  /* Acid glow on primary actions */
  button.bg-primary, [data-variant="primary"], .btn-primary,
  button[data-primary] {
    box-shadow: 0 0 24px -5px rgba(204, 255, 51, 0.65) !important;
  }
  /* Subtle CRT scanline overlay — retro terminal eye-candy, very low alpha */
  body::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 2px,
      rgba(204, 255, 51, 0.028) 3px, rgba(204, 255, 51, 0.028) 4px
    );
    mix-blend-mode: screen;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb {
    background: color-mix(in srgb, #ccff33 24%, #0a0b07);
    border: 3px solid #0a0b07; border-radius: 999px;
  }
  ::-webkit-scrollbar-track { background: transparent; }
