# ~/.hermes/dashboard-themes/carbon-glow.yaml
# ──────────────────────────────────────────────────────────────
#  CARBON GLOW  ·  cool pure-black + glassy cards + glowing data-viz
#  Slightly cooler & darker than Lime Signal, brighter lime, more
#  pronounced glow on telemetry and primary actions.
# ──────────────────────────────────────────────────────────────
name: carbon-glow
label: Carbon Glow
description: Cool pure-black with glassy elevated cards and a brighter, glowing lime.

palette:
  background:
    hex: "#08090b"
    alpha: 1.0
  midground:
    hex: "#e7eaef"      # cool light grey → body text
    alpha: 1.0
  foreground:
    hex: "#ffffff"
    alpha: 0.0
  warmGlow: "rgba(182, 242, 74, 0.16)"
  noiseOpacity: 0.65

typography:
  fontSans: '"Geist", system-ui, -apple-system, "Segoe UI", sans-serif'
  fontMono: '"JetBrains Mono", ui-monospace, "SFMono-Regular", monospace'
  fontDisplay: '"Geist", system-ui, sans-serif'
  fontUrl: "https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
  baseSize: "16px"
  lineHeight: "1.55"
  letterSpacing: "-0.005em"

layout:
  radius: "0.6rem"
  density: comfortable

layoutVariant: cockpit

componentStyles:
  card:
    background: "linear-gradient(180deg, rgba(17, 20, 24, 0.92), rgba(8, 9, 11, 0.95))"
    boxShadow: "inset 0 0 0 1px rgba(182, 242, 74, 0.14), 0 22px 48px -26px rgba(0, 0, 0, 0.95)"
  header:
    background: "linear-gradient(180deg, rgba(13, 16, 20, 0.96), rgba(8, 9, 11, 0.92))"
  sidebar:
    background: "linear-gradient(180deg, rgba(13, 16, 20, 0.65), rgba(8, 9, 11, 0))"
  footer:
    background: "rgba(13, 16, 20, 0.65)"

colorOverrides:
  primary: "#b6f24a"
  primaryForeground: "#08090b"
  accent: "#b6f24a"
  accentForeground: "#08090b"
  ring: "#b6f24a"
  border: "rgba(182, 242, 74, 0.16)"
  input: "rgba(255, 255, 255, 0.05)"
  mutedForeground: "#919aa6"
  success: "#86e26e"
  warning: "#eccf52"
  destructive: "#ff6b6b"

customCSS: |
  /* Stronger lime glow — this theme leans into the eye-candy */
  .hermes-dashboard [data-variant="primary"],
  button[data-primary] {
    box-shadow: 0 0 28px -4px rgba(182, 242, 74, 0.7) !important;
  }
  :focus-visible {
    outline: none !important;
    box-shadow: 0 0 0 3px rgba(182, 242, 74, 0.22) !important;
  }
  /* Glassy card sheen + lift on hover */
  :root[data-layout-variant="cockpit"] [data-card]:hover,
  :root[data-layout-variant="cockpit"] .card:hover {
    box-shadow: inset 0 0 0 1px rgba(182, 242, 74, 0.28),
                0 26px 54px -24px rgba(0, 0, 0, 0.95),
                0 0 40px -26px rgba(182, 242, 74, 0.6) !important;
  }
  /* Cool radial glow behind the shell */
  :root[data-layout-variant="cockpit"] body::after {
    content: "";
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(120% 90% at 82% -12%, rgba(182, 242, 74, 0.09), transparent 52%),
      radial-gradient(90% 80% at 6% 112%, rgba(120, 200, 255, 0.06), transparent 60%);
    animation: glow-breathe 7s ease-in-out infinite;
  }
  @keyframes glow-breathe {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb {
    background: color-mix(in srgb, #b6f24a 24%, #08090b);
    border: 3px solid #08090b; border-radius: 999px;
  }
